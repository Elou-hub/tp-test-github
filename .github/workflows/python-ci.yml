name: Python CI Matrix

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Linting - Python ${{ matrix.python-version }} - Ubuntu ${{ matrix.os }}
    runs-on: ubuntu-${{ matrix.os }}

    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        os: ["22.04", "24.04"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - run: pip install -r requirements.txt

      - run: flake8 calculs tests main.py

  type-check:
    name: Type checking - Python ${{ matrix.python-version }} - Ubuntu ${{ matrix.os }}
    runs-on: ubuntu-${{ matrix.os }}

    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        os: ["22.04", "24.04"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - run: pip install -r requirements.txt

      - run: mypy calculs main.py

  tests:
    name: Tests - Python ${{ matrix.python-version }} - Ubuntu ${{ matrix.os }}
    runs-on: ubuntu-${{ matrix.os }}

    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        os: ["22.04", "24.04"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - run: pip install -r requirements.txt

      - run: pytest --cov=calculs --cov-report=term-missing --cov-fail-under=90

  compile:
    name: Compilation - Python ${{ matrix.python-version }} - Ubuntu ${{ matrix.os }}
    runs-on: ubuntu-${{ matrix.os }}

    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        os: ["22.04", "24.04"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - run: pip install -r requirements.txt

      - run: python main.py

  build:
    name: Build - Python ${{ matrix.python-version }} - Ubuntu ${{ matrix.os }}
    runs-on: ubuntu-${{ matrix.os }}

    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        os: ["22.04", "24.04"]

    needs: [lint, type-check, tests, compile]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - run: pip install -r requirements.txt

      - run: pyinstaller --onefile --name calculs main.py
