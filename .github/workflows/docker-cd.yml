name: Docker CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  docker-build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME_LOWER=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t $IMAGE_NAME_LOWER:latest \
            -t $IMAGE_NAME_LOWER:${{ github.sha }} \
            .

      - name: Push Docker image latest
        run: docker push $IMAGE_NAME_LOWER:latest

      - name: Push Docker image sha
        run: docker push $IMAGE_NAME_LOWER:${{ github.sha }}
